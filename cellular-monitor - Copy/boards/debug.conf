# Log
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_ALGORITHM_LOGGING=y
CONFIG_AWS_IOT_LOG_LEVEL_DBG=y
CONFIG_MQTT_HELPER_LOG_LEVEL_DBG=y

CONFIG_AT_CMD_CUSTOM=y
CONFIG_TESTING_DISABLE_MODEM=n

# AT Host
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_AT_HOST_LIBRARY=y

# Debug
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
CONFIG_RESET_ON_FATAL_ERROR=n
CONFIG_REBOOT=y

# if we want to 
# CONFIG_DEBUG=y
# CONFIG_WDT_LOG_LEVEL_OFF=n

# Thread analyzer
CONFIG_THREAD_NAME=y
# CONFIG_THREAD_ANALYZER=y
# CONFIG_THREAD_ANALYZER_AUTO=y
# CONFIG_THREAD_ANALYZER_USE_LOG=y
# CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=30

# CONFIG_NRF_MODEM_LIB_TRACE=y

CONFIG_MODEM_BATTERY=y
CONFIG_MODEM_BATTERY_LOG_LEVEL_DBG=y
CONFIG_MODEM_BATTERY_POFWARN_3000=y
CONFIG_MODEM_BATTERY_LOW_LEVEL=3100