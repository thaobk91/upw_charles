# Pipe Monitor (Pulse Monitor) specific config
CONFIG_PIPE_MONITOR_BOARD=y

# System features
CONFIG_REBOOT=y

# No need for power saving when connected to an outlet
CONFIG_LTE_PSM_REQ=n
CONFIG_LTE_PROPRIETARY_PSM_REQ=n
CONFIG_LTE_EDRX_REQ=n

# # Disable FOTA/MCUboot for pipe monitor builds (no secondary partition)
# CONFIG_BOOTLOADER_MCUBOOT=n
# CONFIG_AWS_FOTA=n
# CONFIG_FOTA_DOWNLOAD=n
# CONFIG_DFU_TARGET=n
# CONFIG_MCUBOOT_IMG_MANAGER=n
# CONFIG_IMG_MANAGER=n
# CONFIG_STREAM_FLASH=n
# CONFIG_IMG_ERASE_PROGRESSIVELY=n
# CONFIG_FLASH_MAP=n

# Enable FOTA/MCUboot for OTA updates
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_AWS_FOTA=y
CONFIG_FOTA_DOWNLOAD=y
CONFIG_DFU_TARGET=y
CONFIG_DFU_TARGET_MCUBOOT=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_FLASH_MAP=y
CONFIG_DOWNLOADER=y
