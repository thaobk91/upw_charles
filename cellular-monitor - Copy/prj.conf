CONFIG_APP_VERSION="v3.1.0"
# CONFIG_ALGORITHM="FOLLOWER"

# AT Host
CONFIG_UART_INTERRUPT_DRIVEN=y 
CONFIG_AT_HOST_LIBRARY=y

# Log
CONFIG_LOG=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_MODE_IMMEDIATE=y

# NEWLIB C
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Network
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n

# LTE link control
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_LTE_M=y
# Enable PSM and eDRX modules (required for NCS 3.0+)
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_LC_EDRX_MODULE=y
## Power saving timers.
# https://www.etsi.org/deliver/etsi_ts/127000_127099/127007/15.02.00_60/ts_127007v150200p.pdf page 102, 7.38 Power saving mode setting +CPSMS 
### 320 hours PSM. https://www.etsi.org/deliver/etsi_ts/124000_124099/124008/13.07.00_60/ts_124008v130700p.pdf  page 669, 10.5.7.4a GPRS Timer 3 
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PSM_REQ_RPTAU="11000001"
### 20 seconds active time. https://www.etsi.org/deliver/etsi_ts/124000_124099/124008/13.07.00_60/ts_124008v130700p.pdf page 668, 10.5.7.3 GPRS Timer
CONFIG_LTE_PSM_REQ_RAT="00001010"
# The network seem to accept them too.
#+CEREG: <stat>[,[<tac>],[<ci>],[<AcT>][,[<cause_type>],[<reject_cause>][,[<Active-Time>],[<Periodic-TAU-ext>]]]] (https://infocenter.nordicsemi.com/index.jsp?topic=%2Fref_at_commands%2FREF%2Fat_commands%2Fnw_service%2Fcereg_read.html)
#+CEREG: 5,"800D","07530B0F",7,,,"00001010","11000001"
#[00:00:04.349,639] <inf> cloud: Network registration status: Connected - roaming
#[00:00:04.358,123] <inf> cloud: PSM parameter update: TAU: 1152000, Active time: 20
# Proprietary PSM request. only works with firmware < v2.0.0. Only works if PSM_REQ is also enabled. Works if normal PSM isn't enabled by the network.
# REMOVED for NCS 3.1.0: Proprietary PSM deprecated for modem firmware >= 2.0.0
# CONFIG_LTE_PROPRIETARY_PSM_REQ=y

# eDRX can reduce power consumption when PSM is disabled by the network
CONFIG_LTE_EDRX_REQ=y

# Modem library
# Modem driver
CONFIG_MODEM=y
CONFIG_NRF_MODEM_LIB=y
CONFIG_MODEM_KEY_MGMT=y

# AWS IoT library
CONFIG_AWS_IOT=y
CONFIG_AWS_IOT_APP_DEVICE_ID_USE_HW_ID=y
CONFIG_AWS_IOT_BROKER_HOST_NAME="a3tqlxqi8kjz1z-ats.iot.us-east-1.amazonaws.com"
CONFIG_MQTT_HELPER_SEC_TAG=204
CONFIG_AWS_FOTA_DOWNLOAD_SECURITY_TAG=204
# Request the shadow upon a connection to AWS. Sends a shadow request every time which is not needed
# CONFIG_AWS_IOT_AUTO_DEVICE_SHADOW_REQUEST=y 
CONFIG_AWS_IOT_TOPIC_UPDATE_DELTA_SUBSCRIBE=y
CONFIG_MQTT_HELPER_LAST_WILL=y
CONFIG_AWS_IOT_TOPIC_GET_ACCEPTED_SUBSCRIBE=n
CONFIG_AWS_IOT_TOPIC_GET_REJECTED_SUBSCRIBE=n
CONFIG_MQTT_HELPER_RX_TX_BUFFER_SIZE=2048
CONFIG_AWS_IOT_LOG_LEVEL_OFF=y
# Default is 30 second but it blocks the algorithm 
CONFIG_AWS_IOT_CONNECT_TIMEOUT_SECONDS=30

# MQTT - Maximum MQTT keep alive timeout specified by AWS IoT Core is 1200 anything higher just disconnects
CONFIG_MQTT_KEEPALIVE=1200
# Do not clean session, so the device gets the downlinks after a reconnect
CONFIG_MQTT_CLEAN_SESSION=n

# Date Time library
CONFIG_DATE_TIME=y

# Modem information
CONFIG_MODEM_INFO=y
CONFIG_BUILD_WITH_TFM=y

# MCUBOOT
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_IMG_MANAGER=y

# Image manager
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y

# AWS FOTA
CONFIG_AWS_FOTA=y
CONFIG_FOTA_DOWNLOAD=y
CONFIG_DFU_TARGET=y

# CJSON
CONFIG_CJSON_LIB=y

# ProtoBuf
CONFIG_NANOPB=y

# Download client (needed by AWS FOTA)
# NCS 3.0+ uses DOWNLOADER instead of deprecated DOWNLOAD_CLIENT
CONFIG_DOWNLOADER=y
# CONFIG_DOWNLOAD_CLIENT is deprecated in NCS 3.0+
# CONFIG_DOWNLOAD_CLIENT=n
# CONFIG_DOWNLOAD_CLIENT_STACK_SIZE=4096

# SENSOR
CONFIG_I2C=y
CONFIG_I2C_LOG_LEVEL_OFF=y
# BUZZER
CONFIG_PWM=y

# PM
CONFIG_PM_DEVICE=y

# WDT
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=y
CONFIG_WDT_LOG_LEVEL_OFF=y

# NVS
CONFIG_NVS=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_NVS_LOG_LEVEL_OFF=y

# Settings backend - NCS 3.0+ uses NVS directly instead of ZMS legacy
# Using NVS as the settings backend
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Disabling unused peripherals
CONFIG_SPI=n
CONFIG_ADC=n

# Heap and stacks
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=32768

# increased 2560 -> 5120 because we were at about 90% usage
CONFIG_MQTT_HELPER_STACK_SIZE=5120
# increased 2048 -> 3000 -> 10000 because it overflows (now at ~60%)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=10000
CONFIG_AT_MONITOR_HEAP_SIZE=1024
# increase because we were over 90% usage
CONFIG_DATE_TIME_THREAD_STACK_SIZE=2000

CONFIG_NCS_SAMPLES_DEFAULTS=y